name: CI

on:
  pull_request:
    branches: [main]
  push:
    branches: [main, rewrite-2026]

jobs:
  test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: astral-sh/setup-uv@v6
        with:
          enable-cache: true
      - name: Install dependencies
        run: uv sync
      - name: Run tests
        run: uv run pytest

  lint:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: astral-sh/setup-uv@v6
        with:
          enable-cache: true
      - name: Install dependencies
        run: uv sync
      - name: Ruff
        run: uv run ruff check src tests mock
      - name: Ruff format
        run: uv run ruff format --check src tests mock

  audit:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: astral-sh/setup-uv@v6
        with:
          enable-cache: true
      - name: Audit dependencies for known vulnerabilities
        run: |
          uv export --format requirements-txt --no-emit-project --no-dev -o requirements-audit.txt
          uvx pip-audit -r requirements-audit.txt

  gitleaks:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0
      - uses: gitleaks/gitleaks-action@v2
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

  terraform:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: hashicorp/setup-terraform@v3
      - name: Validate infrastructure configuration (offline)
        run: |
          terraform fmt -check -recursive infra
          terraform -chdir=infra init -backend=false
          terraform -chdir=infra validate
          terraform -chdir=infra/bootstrap init -backend=false
          terraform -chdir=infra/bootstrap validate
